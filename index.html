<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#16833b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Compras" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>Lista de Compras</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Supermercado</p>
          <h1>Lista de Compras</h1>
        </div>

        <div id="syncEstado" class="sync-pill">Cargando</div>
      </header>

      <section class="main-panel">
        <h2 class="main-title">Mi lista</h2>

        <label class="field search-main">
          <span>Buscar producto para agregar</span>
          <input
            id="buscar"
            class="input"
            type="search"
            placeholder="Ej: huevos, leche, pan"
            autocomplete="off"
          />
        </label>

        <div
          id="productos"
          class="resultados-busqueda"
          aria-live="polite"
        ></div>

        <section class="crear-producto-box">
          <button
            id="abrirCrearProducto"
            class="btn btn-crear-producto"
            type="button"
          >
            No encuentro el producto, crear uno nuevo
          </button>

          <form id="formCrearProducto" class="crear-producto-form" hidden>
            <label class="field">
              <span>Nombre del producto</span>
              <input
                id="nuevoProductoNombre"
                class="input"
                type="text"
                autocomplete="off"
              />
            </label>

            <label class="field">
              <span>Categoría</span>
              <select id="nuevoProductoCategoria" class="input"></select>
            </label>

            <div class="form-actions">
              <button
                id="guardarCrearProducto"
                class="btn btn-agregar"
                type="submit"
              >
                Guardar producto
              </button>

              <button
                id="cancelarCrearProducto"
                class="btn btn-light"
                type="button"
              >
                Cancelar
              </button>
            </div>
          </form>
        </section>

        <section class="acciones-superiores acciones-superiores-3">
          <div class="dropdown-productos">
            <button
              id="abrirMenuProductos"
              class="btn btn-menu-productos"
              type="button"
            >
              Lista de productos disponibles
            </button>

            <div id="menuProductos" class="menu-productos" hidden></div>
          </div>

          <div class="dropdown-productos">
            <button
              id="abrirMenuFavoritos"
              class="btn btn-menu-favoritos"
              type="button"
            >
              Favoritos
            </button>

            <div
              id="menuFavoritos"
              class="menu-productos menu-favoritos"
              hidden
            ></div>
          </div>

          <button
            id="finalizarPedido"
            class="btn btn-finalizar btn-finalizar-compacto"
            type="button"
          >
            Finalizar pedido
          </button>
        </section>

        <section class="section lista-unica-section">
          <div class="section-title section-title-lista">
            <h2>Productos a comprar</h2>

            <div class="acciones-lista">
              <button
                id="borrarListaCompleta"
                class="btn btn-borrar-lista"
                type="button"
              >
                Borrar lista completa
              </button>

              <button id="limpiarComprados" class="btn btn-light" type="button">
                Limpiar comprados
              </button>
            </div>
          </div>

          <div id="lista" class="grid lista-grid" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <div id="modalBorrarLista" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-modal="true">
        <h2>VAS A BORRAR TODA LA LISTA DE COMPRA CARGADA.</h2>

        <p>¿SEGURO QUERÉS BORRAR?</p>

        <div class="modal-actions">
          <button
            id="confirmarBorrarLista"
            class="btn btn-confirmar-borrar"
            type="button"
          >
            Sí, borrar
          </button>

          <button
            id="cancelarBorrarLista"
            class="btn btn-cancelar-borrar"
            type="button"
          >
            No, cancelar
          </button>
        </div>
      </div>
    </div>

    <div id="mensajeApp" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
